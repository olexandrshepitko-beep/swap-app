name: CI/CD Pipeline

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  lint-and-type-check:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          cd backend
          python -m pip install --upgrade pip
          pip install flake8 mypy
          pip install -r requirements.txt
          pip install hypothesis pytest-cov pytest-mock

      - name: Lint with flake8
        continue-on-error: true
        run: |
          cd backend
          flake8 app/ --count --max-line-length=100 --show-source --statistics || true

      - name: Type check with mypy
        continue-on-error: true
        run: |
          cd backend
          mypy app/ --ignore-missing-imports || true

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          cd backend
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install hypothesis pytest-cov pytest-mock pytest-asyncio

      - name: Run unit tests with coverage
        run: |
          cd backend
          pytest tests/unit/ -v --cov=app --cov-report=xml --cov-report=term

  fuzz-tests:
    name: Fuzz Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          cd backend
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install hypothesis pytest-cov pytest-mock pytest-asyncio

      - name: Run fuzz tests
        run: |
          cd backend
          pytest tests/fuzz/ -v --hypothesis-show-statistics --cov=app --cov-report=term

  deploy:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    needs: [unit-tests, fuzz-tests]
    if: github.ref == 'refs/heads/master' && success()

    steps:
      - uses: actions/checkout@v4

      - name: Deploy via Railway API
        run: |
          cat << 'EOF' > /tmp/deploy.json
          {"query":"mutation { serviceInstanceDeployV2(serviceId: \"913fa5a5-d218-4c31-9b10-ba16b796858f\", environmentId: \"5a8b94e9-fa58-4ac0-9dbb-6d57d3f7f5bf\") }"}
          EOF
          RESPONSE=$(curl -s -X POST "https://api.railway.app/graphql/v2" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.RAILWAY_TOKEN }}" \
            -d @/tmp/deploy.json)
          echo "$RESPONSE"
          if echo "$RESPONSE" | grep -q "Not Authorized"; then
            echo "❌ RAILWAY_TOKEN is not authorized for deploy"
            exit 1
          fi
          if echo "$RESPONSE" | grep -q '"errors"'; then
            echo "❌ Deploy API returned error"
            exit 1
          fi
          echo "✅ Deploy triggered successfully"
