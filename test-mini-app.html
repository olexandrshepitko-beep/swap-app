<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <title>Mini App Test</title>
  <style>
    body { background: #0d0d1a; color: #e8e8f0; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; text-align: center; padding: 20px; }
    h1 { color: #667eea; }
    .status { padding: 12px; border-radius: 8px; margin: 8px 0; width: 100%; max-width: 300px; }
    .ok { background: #1a3a1a; border: 1px solid #4caf50; }
    .fail { background: #3a1a1a; border: 1px solid #f44336; }
    .info { background: #1a1a3a; border: 1px solid #667eea; }
  </style>
</head>
<body>
  <h1>🧪 Mini App Test</h1>
  <div class="status info">⏳ Telegram SDK: загружается...</div>
  <div class="status info">⏳ JavaScript: выполняется...</div>

  <script>
    try {
      const divs = document.querySelectorAll('.status');
      
      if (window.Telegram?.WebApp) {
        divs[0].className = 'status ok';
        divs[0].textContent = '✅ Telegram SDK: загружен';
        
        const wa = window.Telegram.WebApp;
        wa.ready();
        wa.expand();
        
        divs[1].className = 'status ok';
        divs[1].textContent = '✅ WebApp.ready() вызван';
        
        setTimeout(() => {
          const s = document.createElement('div');
          s.className = 'status ok';
          s.style.marginTop = '16px';
          s.textContent = `✅ Все ок! initData: ${wa.initData ? 'есть' : 'нет'}, user: ${wa.initDataUnsafe?.user?.first_name || 'аноним'}`;
          document.body.appendChild(s);
        }, 500);
      } else {
        divs[0].className = 'status fail';
        divs[0].textContent = '❌ Telegram SDK: НЕ загружен';
        divs[1].className = 'status fail';
        divs[1].textContent = '❌ Работаем вне Telegram';
      }
    } catch(e) {
      document.body.innerHTML += `<div class="status fail">❌ Ошибка: ${e.message}</div>`;
    }
  </script>
</body>
</html>
